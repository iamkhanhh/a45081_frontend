<div class="container-fluid px-0">

  <!-- Loading overlay -->
  <div *ngIf="isLoading"
       class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center loading-overlay">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading…</span>
    </div>
  </div>

  <!-- ── GREETING BANNER ──────────────────────────────────────── -->
  <div class="greeting-banner rounded-3 p-8 p-lg-10 mb-8 d-flex align-items-center justify-content-between flex-wrap gap-5">
    <div>
      <div class="text-white opacity-75 fw-semibold fs-6 mb-2">{{ todayLabel }}</div>
      <h2 class="text-white fw-bolder fs-2hx lh-sm mb-0">
        {{ greeting }}, {{ userName }} 👋
      </h2>
    </div>
    <div class="d-flex gap-3 flex-wrap">
      <a routerLink="/analyses" class="btn fw-bolder btn-lg greeting-btn-outline">
        <i class="fa-solid fa-flask-vial me-2"></i>{{ 'MENU.ANALYSES' | translate }}
      </a>
      <a routerLink="/workspaces" class="btn fw-bolder btn-lg greeting-btn-outline">
        <i class="fa-solid fa-folder-open me-2"></i>{{ 'MENU.WORKSPACES' | translate }}
      </a>
    </div>
  </div>

  <!-- ── STAT CARDS ───────────────────────────────────────────── -->
  <div class="row g-5 mb-7">
    <div class="col-sm-3 col-xl-4">
      <app-stats-widget2
        class="card border-0 shadow-sm h-100"
        [title]="'DASHBOARD.TOTAL_WORKSPACES' | translate"
        [description]="totalWorkspaces"
        iconClass="fa-solid fa-folder-open"
        color="primary"
      ></app-stats-widget2>
    </div>
    <div class="col-sm-3 col-xl-4">
      <app-stats-widget2
        class="card border-0 shadow-sm h-100"
        [title]="'DASHBOARD.TOTAL_ANALYSES' | translate"
        [description]="totalAnalyses"
        iconClass="fa-solid fa-flask-vial"
        color="info"
      ></app-stats-widget2>
    </div>
    <div class="col-sm-3 col-xl-4">
      <app-stats-widget2
        class="card border-0 shadow-sm h-100"
        [title]="'DASHBOARD.TOTAL_SAMPLES' | translate"
        [description]="totalSamples"
        iconClass="fa-solid fa-dna"
        color="success"
      ></app-stats-widget2>
    </div>
  </div>

  <!-- ── TREND + STATUS ───────────────────────────────────────── -->
  <div class="row g-5 mb-7">
    <div class="col-lg-8">
      <app-charts-widget5
        class="card border-0 shadow-sm h-100"
        [chartType]="'area'"
        [seriesData]="combinedTrendData"
        [xAxisCategories]="lastSixMonths"
        title="Activity Trend"
        subtitle="Samples and analyses created over the last 6 months"
      ></app-charts-widget5>
    </div>
    <div class="col-lg-4">
      <app-charts-widget5
        class="card border-0 shadow-sm h-100"
        [chartType]="'pie'"
        [pieData]="analysesStatusData"
        [title]="'DASHBOARD.ANALYSES_STATUS' | translate"
        [subtitle]="'DASHBOARD.ANALYSES_STATUS_DESC' | translate"
      ></app-charts-widget5>
    </div>
  </div>

  <!-- ── FILE TYPE + ASSEMBLY ─────────────────────────────────── -->
  <div class="row g-5 mb-7">
    <div class="col-lg-6">
      <app-charts-widget5
        class="card border-0 shadow-sm h-100"
        [chartType]="'pie'"
        [pieData]="sampleFileTypeData"
        [title]="'DASHBOARD.SAMPLES_FILE_TYPE' | translate"
        [subtitle]="'DASHBOARD.SAMPLES_FILE_TYPE_DESC' | translate"
      ></app-charts-widget5>
    </div>
    <div class="col-lg-6">
      <app-charts-widget5
        class="card border-0 shadow-sm h-100"
        [chartType]="'pie'"
        [pieData]="sampleAssemblyData"
        [title]="'DASHBOARD.SAMPLES_ASSEMBLY' | translate"
        [subtitle]="'DASHBOARD.SAMPLES_ASSEMBLY_DESC' | translate"
      ></app-charts-widget5>
    </div>
  </div>

  <!-- ── RECENT ANALYSES ──────────────────────────────────────── -->
  <div class="row g-5">
    <div class="col-12">
      <div class="card border-0 shadow-sm">
        <div class="card-header border-0 pt-6 d-flex align-items-center justify-content-between">
          <div>
            <h3 class="card-title fw-bolder text-gray-900 mb-1">
              {{ 'DASHBOARD.RECENT_ANALYSES' | translate }}
            </h3>
            <span class="text-muted fw-semibold fs-7">
              {{ 'DASHBOARD.RECENT_ANALYSES_DESC' | translate }}
            </span>
          </div>
          <a routerLink="/analyses" class="btn btn-sm btn-light-primary fw-bolder">
            <i class="fa-solid fa-arrow-right me-1"></i>View All
          </a>
        </div>
        <app-lists-widget1
          [title]="''"
          [subtitle]="''"
          [items]="recentAnalyses"
        ></app-lists-widget1>
      </div>
    </div>
  </div>

</div>
