<div class="card-body d-flex justify-content-between align-items-center p-7">
  <div class="d-flex flex-column">
    <span class="text-muted fw-semibold fs-7 mb-3">{{ title }}</span>
    <span class="fw-bolder text-dark lh-1" style="font-size: 2.6rem; letter-spacing: -1px;">
      {{ description }}
    </span>
  </div>
  <div class="stat-icon-wrap rounded-3" [ngClass]="'bg-light-' + color">
    <i [class]="iconClass + ' fs-2x text-' + color"></i>
  </div>
</div>
