<!--begin::Wrapper-->
<div data-kt-search-element="wrapper">

  <!--begin::Form-->
  <form data-kt-search-element="form" class="w-100 position-relative mb-3" autocomplete="off">
    <!--begin::Icon-->
    <span
      [inlineSVG]="'./assets/media/icons/duotune/general/gen021.svg'"
      class="svg-icon svg-icon-2 svg-icon-lg-1 svg-icon-gray-500 position-absolute top-50 translate-middle-y ms-0"
    ></span>
    <!--end::Icon-->

    <!--begin::Input-->
    <input type="text" class="form-control form-control-flush ps-10" name="search" value="" placeholder="Search..." data-kt-search-element="input" [ngModel]="keyword" (ngModelChange)="search($event)"/>
    <!--end::Input-->

    <!--begin::Spinner-->
    <span class="position-absolute top-50 end-0 translate-middle-y lh-0 me-1" data-kt-search-element="spinner" [ngClass]="searching ? '' : 'd-none'">
        <span class="spinner-border h-15px w-15px align-middle text-gray-500"></span>
    </span>
    <!--end::Spinner-->

    <!--begin::Reset-->
    <span class="btn btn-flush btn-active-color-primary position-absolute top-50 end-0 translate-middle-y lh-0" data-kt-search-element="clear" [ngClass]="searching || keyword.length === 0 ? 'd-none' : ''" (click)="clearSearch()">
        <span
          [inlineSVG]="'./assets/media/icons/duotune/arrows/arr061.svg'"
          class="svg-icon svg-icon-2 svg-icon-lg-1 me-0"
        ></span>
    </span>
    <!--end::Reset-->

  </form>
  <!--end::Form-->

  <!--begin::Separator-->
  <div class="separator border-gray-200 mb-6"></div>
  <!--end::Separator-->


  <!--begin::Recently viewed-->
  <div data-kt-search-element="results" [ngClass]="searching || keyword.length === 0 ? 'd-none' : ''">
    <!--begin::Items-->
    <div class="scroll-y mh-200px mh-lg-325px">
      <!-- Samples -->
      <div class="mb-4">
        <h3 class="fs-6 text-muted m-0 pb-2">Samples</h3>
        <div *ngIf="searchSamples && searchSamples.length > 0; else noSamples">
          <a *ngFor="let s of searchSamples; let i = index"
             class="d-flex justify-content-between align-items-center mb-3 p-3 bg-white rounded shadow-sm text-decoration-none text-reset"
             (click)="clearSearch(); router.navigate(['/samples']);"
             style="cursor:pointer; transition: transform 0.12s ease, box-shadow 0.12s ease;">

            <div class="d-flex align-items-center">
              <div class="symbol symbol-40px me-3 d-flex align-items-center justify-content-center bg-light rounded-circle border">
                <span class="fs-5 fw-bolder text-primary">{{ i + 1 }}</span>
              </div>
              <div class="d-flex flex-column">
                <span class="fs-6 fw-bold text-truncate" style="max-width:280px">{{ s.name || s.sample_name || s.title }}</span>
                <small class="text-muted text-truncate" style="max-width:280px">{{ s.description || '' }}</small>
              </div>
            </div>

            <span class="badge bg-light text-muted ms-3">Sample</span>
          </a>
        </div>
        <ng-template #noSamples><div class="text-muted">No samples</div></ng-template>
      </div>

      <!-- Analyses -->
      <div class="mb-4">
        <h3 class="fs-6 text-muted m-0 pb-2">Analyses</h3>
        <div *ngIf="searchAnalyses && searchAnalyses.length > 0; else noAnalyses">
          <a *ngFor="let a of searchAnalyses; let j = index"
             class="d-flex justify-content-between align-items-center mb-3 p-3 bg-white rounded shadow-sm text-decoration-none text-reset"
             (click)="clearSearch(); router.navigate(['/analyses/index', a.id]);"
             style="cursor:pointer; transition: transform 0.12s ease, box-shadow 0.12s ease;">

            <div class="d-flex align-items-center">
              <div class="symbol symbol-40px me-3 d-flex align-items-center justify-content-center bg-light rounded-circle border">
                <span class="fs-5 fw-bolder text-primary">{{ j + 1 }}</span>
              </div>
              <div class="d-flex flex-column">
                <span class="fs-6 fw-bold text-truncate" style="max-width:280px">{{ a.name || a.title }}</span>
                <small class="text-muted text-truncate" style="max-width:280px">{{ a.description || '' }}</small>
              </div>
            </div>

            <span class="badge bg-light text-muted ms-3">Analysis</span>
          </a>
        </div>
        <ng-template #noAnalyses><div class="text-muted">No analyses</div></ng-template>
      </div>

      <!-- Workspaces -->
      <div class="mb-4">
        <h3 class="fs-6 text-muted m-0 pb-2">Workspaces</h3>
        <div *ngIf="searchWorkspaces && searchWorkspaces.length > 0; else noWorkspaces">
          <a *ngFor="let w of searchWorkspaces; let k = index"
             class="d-flex justify-content-between align-items-center mb-3 p-3 bg-white rounded shadow-sm text-decoration-none text-reset"
             (click)="clearSearch(); router.navigate(['/workspaces/index', w.id]);"
             style="cursor:pointer; transition: transform 0.12s ease, box-shadow 0.12s ease;">

            <div class="d-flex align-items-center">
              <div class="symbol symbol-40px me-3 d-flex align-items-center justify-content-center bg-light rounded-circle border">
                <span class="fs-5 fw-bolder text-primary">{{ k + 1 }}</span>
              </div>
              <div class="d-flex flex-column">
                <span class="fs-6 fw-bold text-truncate" style="max-width:280px">{{ w.name || w.title }}</span>
                <small class="text-muted text-truncate" style="max-width:280px">{{ w.description || '' }}</small>
              </div>
            </div>

            <span class="badge bg-light text-muted ms-3">Workspace</span>
          </a>
        </div>
        <ng-template #noWorkspaces><div class="text-muted">No workspaces</div></ng-template>
      </div>
    </div>
    <!--end::Items-->
  </div>
  <!--end::Recently viewed-->

  <!--begin::Recently viewed-->
  <div data-kt-search-element="results" [ngClass]="keyword.length > 0 ? 'd-none' : ''">
    <!--begin::Items-->
    <div class="scroll-y mh-200px mh-lg-325px">
      <!--begin::Category title-->
      <!--end::Category title-->

      <!--begin::Item-->
      <!--end::Item-->
    </div>
    <!--end::Items-->
  </div>
  <!--end::Recently viewed-->

 

</div>
<!--end::Wrapper-->
