<!-- Header -->
<div class="card-header pe-5">
  <div class="card-title">
    <div class="d-flex justify-content-center flex-column me-3">
      <span class="fs-4 fw-bolder text-gray-900 me-1 mb-2 lh-1">
        <i class="bi bi-robot fs-3 me-2"></i>AI Assistant
      </span>
      <span class="fs-7 fw-bold text-gray-500">Bioinformatics Chatbot</span>
    </div>
  </div>
  <div class="card-toolbar">
    <button
      class="btn btn-sm btn-icon btn-active-light-primary me-2"
      (click)="onNewConversation.emit()"
      title="New conversation"
    >
      <i class="bi bi-plus-lg fs-3"></i>
    </button>
    <div
      class="btn btn-sm btn-icon btn-active-light-primary"
      id="kt_drawer_chat_close"
    >
      <span
        [inlineSVG]="'./assets/media/icons/duotune/arrows/arr061.svg'"
        class="svg-icon svg-icon-2"
      ></span>
    </div>
  </div>
</div>

<!-- Conversation List -->
<div class="card-body py-5 scroll-y" style="max-height: calc(100vh - 80px);">
  <!-- Empty state -->
  <div *ngIf="(conversations$ | async)?.length === 0" class="text-center py-10">
    <i class="bi bi-chat-dots fs-2x text-gray-400 mb-3 d-block"></i>
    <p class="text-gray-500 fs-6 mb-5">No conversations yet</p>
    <button class="btn btn-sm btn-primary" (click)="onNewConversation.emit()">
      <i class="bi bi-plus-lg me-1"></i>Start a conversation
    </button>
  </div>

  <!-- Conversation items -->
  <div
    *ngFor="let conv of conversations$ | async"
    class="d-flex align-items-center p-4 mb-2 rounded cursor-pointer"
    [ngClass]="{
      'bg-light-primary': activeConversation?.id === conv.id,
      'hover-bg-light': activeConversation?.id !== conv.id
    }"
    (click)="onSelectConversation.emit(conv)"
  >
    <div class="symbol symbol-40px symbol-circle me-3">
      <span class="symbol-label bg-light-info text-info fs-5 fw-bolder">
        <i class="bi bi-chat-left-text text-info"></i>
      </span>
    </div>
    <div class="d-flex flex-column flex-grow-1 overflow-hidden">
      <span class="fs-6 fw-bold text-gray-900 text-truncate">{{ conv.title }}</span>
      <span class="text-muted fs-7">{{ conv.updatedAt | date:'short' }}</span>
    </div>
    <button
      class="btn btn-sm btn-icon btn-active-light-danger ms-2"
      (click)="deleteConversation($event, conv.id)"
      title="Delete"
    >
      <i class="bi bi-trash fs-6"></i>
    </button>
  </div>
</div>
