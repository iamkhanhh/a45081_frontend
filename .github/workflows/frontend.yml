name: Frontend — Build, Deploy & Notify

on:
  push:
    branches: [dev]
    paths:
      - '**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/genetics-frontend
  CONTAINER_NAME: genetics-frontend

jobs:
  # ── Job 1: Build & Push image ──────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get short SHA
        id: meta
        run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create environment files
        run: |
          mkdir -p src/environments
          cat > src/environments/environment.ts << EOF
          export const environment = {
              production: false,
              appVersion: 'v8.2.4',
              USERDATA_KEY: 'authf649fc9a5f55',
              isMockEnabled: false,
              apiUrl: 'http://localhost:3000'
              appThemeName: 'Metronic',
              appPurchaseUrl: 'https://1.envato.market/EA4JP',
              appHTMLIntegration: 'https://preview.keenthemes.com/metronic8/demo2/documentation/base/helpers/flex-layouts.html',
              appPreviewUrl: 'https://preview.keenthemes.com/metronic8/angular/demo2/',
              appPreviewAngularUrl: 'https://preview.keenthemes.com/metronic8/angular/demo2',
              appPreviewDocsUrl: 'https://preview.keenthemes.com/metronic8/angular/docs',
              appPreviewChangelogUrl: 'https://preview.keenthemes.com/metronic8/angular/docs/changelog',
              appDemos: {},
          };
          EOF
          cat > src/environments/environment.prod.ts << EOF
          export const environment = {
              production: true,
              appVersion: 'v8.2.4',
              USERDATA_KEY: 'authf649fc9a5f55',
              isMockEnabled: false,
              apiUrl: 'http://localhost:3000',
              appThemeName: 'Metronic',
              appPurchaseUrl: 'https://1.envato.market/EA4JP',
              appHTMLIntegration: 'https://preview.keenthemes.com/metronic8/demo2/documentation/base/helpers/flex-layouts.html',
              appPreviewUrl: 'https://preview.keenthemes.com/metronic8/angular/demo2/',
              appPreviewAngularUrl: 'https://preview.keenthemes.com/metronic8/angular/demo2',
              appPreviewDocsUrl: 'https://preview.keenthemes.com/metronic8/angular/docs',
              appPreviewChangelogUrl: 'https://preview.keenthemes.com/metronic8/angular/docs/changelog',
              appDemos: {},
          };
          EOF

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy lên server ───────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:latest

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 8080:80 \
              ${{ env.IMAGE_NAME }}:latest

            docker image prune -f

  # ── Job 3: Telegram Notification ──────────────────────
  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Notify Success
        if: needs.deploy.result == 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            ✅ <b>[FRONTEND] Deploy thành công!</b>

            🌿 <b>Branch:</b> ${{ github.ref_name }}
            👤 <b>By:</b> ${{ github.actor }}
            📝 <b>Commit:</b> ${{ github.event.head_commit.message }}
            🏷 <b>Tag:</b> <code>${{ needs.build.outputs.image_tag }}</code>

            🔗 <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Xem chi tiết</a>

      - name: Notify Failure
        if: needs.build.result == 'failure' || needs.deploy.result == 'failure'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            ❌ <b>[FRONTEND] Deploy thất bại!</b>

            🌿 <b>Branch:</b> ${{ github.ref_name }}
            👤 <b>By:</b> ${{ github.actor }}
            📝 <b>Commit:</b> ${{ github.event.head_commit.message }}

            🔍 Build: ${{ needs.build.result }}
            🚀 Deploy: ${{ needs.deploy.result }}

            🔗 <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Xem log lỗi</a>
